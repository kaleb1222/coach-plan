name: Update Drills & Push OTA

on:
  repository_dispatch:
    types: [update-drills]

  workflow_dispatch:
    inputs:
      drill_text:
        description: "Raw drill text to parse"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-drills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Save drill text and PDF mapping
        env:
          DRILL_TEXT_DISPATCH: ${{ github.event.client_payload.drill_text }}
          DRILL_TEXT_MANUAL: ${{ inputs.drill_text }}
          PDF_MAPPING: ${{ toJSON(github.event.client_payload.pdf_mapping) }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            printf '%s' "$DRILL_TEXT_DISPATCH" > /tmp/drill_input.txt
          else
            printf '%s' "$DRILL_TEXT_MANUAL" > /tmp/drill_input.txt
          fi

          # Save PDF mapping (may be empty object for manual triggers)
          printf '%s' "$PDF_MAPPING" > /tmp/pdf_mapping.json

          echo "Drill text: $(wc -c < /tmp/drill_input.txt) bytes"
          echo "PDF mapping: $(cat /tmp/pdf_mapping.json | python3 -c 'import json,sys; d=json.load(sys.stdin) if sys.stdin.read() != "null" else {}; print(len(d), "PDFs")' 2>/dev/null || echo 'none')"

      - name: Generate drills.js via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-drills.js /tmp/drill_input.txt src/drills.js /tmp/pdf_mapping.json

      - name: Validate generated drills.js
        run: |
          echo "Validating drills.js syntax..."
          node --input-type=module -e "
            import { WEEK_LABEL, WARMUP, MON_TUE, WED_THU } from './src/drills.js';
            if (!WEEK_LABEL || !WARMUP?.drills?.length || !MON_TUE?.drills?.length || !WED_THU?.drills?.length) {
              console.error('drills.js is missing required exports or has empty drill arrays');
              process.exit(1);
            }
            const total = WARMUP.drills.length + MON_TUE.drills.length + WED_THU.drills.length;
            console.log('✅ drills.js valid — ' + WEEK_LABEL + ' — ' + total + ' drills');
          "

      - name: Pull latest (PDFs may have been pushed by Apps Script)
        run: |
          git stash
          git pull --rebase origin main
          git stash pop || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/drills.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to drills.js"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "drills.js has been updated"
            git diff --stat src/drills.js
          fi

      - name: Commit & push updated drills.js
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Coach's Plan Bot"
          git config user.email "bot@coachplan.app"
          git add src/drills.js
          git commit -m "Update drills — $(date +'%B %d, %Y')"
          git push

      - name: Setup Expo
        if: steps.changes.outputs.changed == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        if: steps.changes.outputs.changed == 'true'
        run: |
          eas update --branch production --message "Weekly drill update — $(date +'%B %d, %Y')" --non-interactive

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "## ✅ Pipeline Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- drills.js updated and committed" >> $GITHUB_STEP_SUMMARY
            echo "- EAS Update published to \`production\` branch" >> $GITHUB_STEP_SUMMARY
            echo "- App will update on next launch" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ No Changes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The generated drills.js was identical to the existing file." >> $GITHUB_STEP_SUMMARY
          fi
